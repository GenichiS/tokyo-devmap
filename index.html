  if(mode==='year'&&playing){fs=DV.features.filter(f=>{const y=f.properties.year_num;return y&&y<=cY})}
  else if(mode==='dev'){fs=DV.features.filter(f=>actD.has(f.properties.developer))}
  else{fs=DV.features}
  ml=L.geoJSON({type:'FeatureCollection',features:fs},{
    style:f=>{const p=f.properties;if(mode==='year'){const c=yc(p.year_num);return{fillColor:c,color:dk(c,30),weight:1.5,fillOpacity:p.year_num?0.65:0.2,opacity:p.year_num?0.85:0.3}}else{const dc=DC[p.developer];const c=dc?dc.c:'#888';return{fillColor:c,color:dk(c,35),weight:1.5,fillOpacity:0.55,opacity:0.85}}},
    onEachFeature:(feature,layer)=>{const p=feature.properties;const dn=p.developer;const dc=DC[dn];const c=dc?dc.c:'#888';const sp=bS(p);
      let pp='<div class="pop-dev" style="color:'+c+'">'+dn+'</div><div class="pop-name">'+p.name+'</div>';
      if(sp)pp+='<div class="pop-specs">'+sp+'</div>';
      if(p.name_en)pp+='<div class="pop-en">'+p.name_en+'</div>';
      layer.bindPopup(pp,{closeButton:false,offset:[0,-2],maxWidth:320});
      layer.on('mouseover',function(){this.setStyle({fillOpacity:0.85,weight:3,color:'#222'});this.bringToFront();
        document.getElementById('ib').style.display='block';document.getElementById('ibd').textContent=dn;document.getElementById('ibd').style.color=c;
        document.getElementById('ibn').textContent=p.name;document.getElementById('ibs').innerHTML=sS(p)});
      layer.on('mouseout',function(){const fc=mode==='year'?yc(p.year_num):c;this.setStyle({fillOpacity:mode==='year'?(p.year_num?0.65:0.2):0.55,weight:1.5,color:dk(fc,30)})})}
  });ml.addTo(map);document.getElementById('tot').textContent=fs.length}
function setMode(m){mode=m;document.getElementById('md').classList.toggle('active',m==='dev');document.getElementById('my').classList.toggle('active',m==='year');document.getElementById('dp').style.display=m==='dev'?'block':'none';document.getElementById('yp').style.display=m==='year'?'block':'none';if(m==='dev')stopTL();rebuild()}
function mkL(id,gs){const el=document.getElementById(id);el.innerHTML='';gs.sort((a,b)=>{if(a==='その他')return 1;if(b==='その他')return -1;return DV.features.filter(f=>f.properties.developer===b).length-DV.features.filter(f=>f.properties.developer===a).length}).forEach(dn=>{if(!DC[dn])return;const cnt=DV.features.filter(f=>f.properties.developer===dn).length;if(!cnt)return;const div=document.createElement('div');div.className='di'+(actD.has(dn)?'':' off');div.innerHTML='<div class="dd" style="background:'+DC[dn].c+'"></div><span class="dn">'+dn+'</span><span class="dc">'+cnt+'</span>';div.onclick=()=>{if(actD.has(dn))actD.delete(dn);else actD.add(dn);mkL('l1',[...G1]);mkL('l2',[...G2]);rebuild()};el.appendChild(div)})}
function toggleAll(){if(allOn){Object.keys(DC).forEach(k=>actD.delete(k));allOn=false;document.getElementById('ab').textContent='すべてON'}else{Object.keys(DC).forEach(k=>actD.add(k));allOn=true;document.getElementById('ab').textContent='すべてOFF'}mkL('l1',[...G1]);mkL('l2',[...G2]);rebuild()}
function startTL(){document.getElementById('tl').style.display='block';cY=1925;document.getElementById('ts').value=cY;uTL();playing=true;rebuild();toggleP()}
function stopTL(){playing=false;if(pt){clearInterval(pt);pt=null}document.getElementById('tl').style.display='none';document.getElementById('tp').classList.remove('on');document.getElementById('tp').textContent='▶';rebuild()}
function toggleP(){const b=document.getElementById('tp');if(pt){clearInterval(pt);pt=null;b.classList.remove('on');b.textContent='▶'}else{b.classList.add('on');b.textContent='⏸';pt=setInterval(()=>{cY++;if(cY>2027)cY=1925;document.getElementById('ts').value=cY;uTL();rebuild()},350)}}
function onSl(v){cY=parseInt(v);uTL();playing=true;rebuild()}
function uTL(){document.getElementById('ty').textContent=cY;document.getElementById('tc').textContent=DV.features.filter(f=>f.properties.year_num&&f.properties.year_num<=cY).length+'棟 竣工済み'}
mkL('l1',[...G1]);mkL('l2',[...G2]);rebuild();
</script></body></html>
